<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinCompass</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:#f5f7fb;
color:#222;
}

/* HEADER */

header{
height:70px;
background:white;
display:flex;
align-items:center;
justify-content:center;
position:relative;
box-shadow:0 3px 20px rgba(0,0,0,0.05);
}

.logo-title{
position:absolute;
left:40px;
font-size:22px;
font-weight:800;
}

/* NAV */

nav{
display:flex;
gap:25px;
}

nav button{
border:none;
background:none;
font-size:15px;
cursor:pointer;
padding:8px 16px;
border-radius:8px;
}

nav button.active{
background:#4b6cff;
color:white;
}

/* MAIN */

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.section{
display:none;
}

.section.active{
display:block;
}

h2{
margin-bottom:20px;
}

/* FORM */

.form{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.form input,
.form select{
width:100%;
padding:13px;
margin-bottom:18px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

.main-btn{
width:100%;
padding:14px;
border:none;
background:#4b6cff;
color:white;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.04);
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
}

th{
background:#fafafa;
text-align:left;
}

.edit-btn{
background:#4b6cff;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.delete-btn{
background:#ff4b4b;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

/* STATS */

.stats{
display:grid;
grid-template-columns: 1fr 2fr;
gap:25px;
align-items:start;
}

/* карточки */

.card{
width:100%;
background:white;
padding:30px;
border-radius:14px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card-title{
color:#777;
font-size:14px;
}

.card-value{
font-size:28px;
font-weight:700;
margin-top:8px;
}

/* диаграмма */

.chart-wrap{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.chart-wrap canvas{
width:100% !important;
height:525px !important;
}

/* ЛЕГЕНДА */

.legend{
display:flex;
flex-direction:column;
gap:14px;
margin-top:20px;
}

.legend-item{
padding:18px 22px;
border-radius:35px;
font-size:18px;
font-weight:700;
color:white;
width:260px;
text-align:center;
}

/* TOOLS */

.tools{
margin-top:20px;
display:flex;
gap:10px;
}

.tools button{
padding:10px 15px;
border:none;
border-radius:6px;
background:#eee;
cursor:pointer;
}

/* NOTIFY */

.notify{
position:fixed;
bottom:20px;
left:50%;
transform:translate(-50%,20px);
background:#4b6cff;
color:white;
padding:14px 22px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
opacity:0;
transition:0.4s;
}

.notify.show{
opacity:1;
transform:translate(-50%,0);
}

</style>
</head>

<body>

<header>

<div class="logo-title">CoinCompass</div>

<nav>
<button class="tab active" onclick="tab('add',this)">Добавить</button>
<button class="tab" onclick="tab('history',this)">История</button>
<button class="tab" onclick="tab('stats',this)">Статистика</button>
<button class="tab" onclick="tab('months',this)">По месяцам</button>
</nav>

</header>

<div class="container">

<div id="add" class="section active">

<h2>Добавить расход</h2>

<div class="form">

<input id="amount" type="number" placeholder="Сумма">

<select id="category">
<option>Еда</option>
<option>Транспорт</option>
<option>Развлечения</option>
<option>Жилье</option>
<option>Покупки</option>
<option>Прочее</option>
</select>

<input id="desc" placeholder="Описание">

<button class="main-btn" onclick="add()">Сохранить расход</button>

</div>
</div>

<div id="history" class="section">

<h2>История расходов</h2>

<table>
<thead>
<tr>
<th>Дата</th>
<th>Категория</th>
<th>Сумма</th>
<th>Описание</th>
<th></th>
</tr>
</thead>
<tbody id="historyBody"></tbody>
</table>

<div class="tools">
<button onclick="exportData()">Экспорт</button>
<input type="file" onchange="importData(event)">
</div>

</div>

<div id="stats" class="section">

<h2>Статистика</h2>

<div class="stats">

<div>

<div class="card">
<div class="card-title">Всего расходов</div>
<div id="total" class="card-value">0</div>
</div>

<div class="card" style="margin-top:20px;">
<div class="card-title">Количество операций</div>
<div id="count" class="card-value">0</div>
</div>

<div id="legend" class="legend"></div>

</div>

<div class="chart-wrap">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<div id="months" class="section">

<h2>Расходы по месяцам</h2>

<table>

<thead>
<tr>
<th>Месяц</th>
<th>Сумма</th>
</tr>
</thead>

<tbody id="monthBody"></tbody>

</table>

</div>

</div>

<div id="notify" class="notify">Расход сохранён</div>

<script>

let expenses = JSON.parse(localStorage.getItem("coincompass")) || []

let chart

const colors = {
"Еда":"#ff6384",
"Транспорт":"#36a2eb",
"Развлечения":"#ffcd56",
"Жилье":"#4bc0c0",
"Покупки":"#9966ff",
"Прочее":"#ff9f40"
}

function save(){
localStorage.setItem("coincompass",JSON.stringify(expenses))
}

function notify(text){
let n=document.getElementById("notify")
n.innerText=text
n.classList.add("show")
setTimeout(()=>{n.classList.remove("show")},2000)
}

function tab(id,btn){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"))

btn.classList.add("active")

render()
}

function add(){

let amount=document.getElementById("amount")
let category=document.getElementById("category")
let desc=document.getElementById("desc")

if(!amount.value) return

expenses.push({
id:Date.now(),
amount:Number(amount.value),
category:category.value,
desc:desc.value,
date:new Date().toISOString()
})

save()

amount.value=""
desc.value=""
category.selectedIndex=0

notify("Расход сохранён")

render()
}

function del(id){
expenses=expenses.filter(e=>e.id!==id)
save()
render()
}

function edit(id){

let e=expenses.find(x=>x.id===id)

let amount=prompt("Новая сумма",e.amount)

if(amount){
e.amount=Number(amount)
save()
render()
}
}

function render(){
renderHistory()
renderStats()
renderMonths()
}

function renderHistory(){

let html=""

expenses.forEach(e=>{

let date=new Date(e.date).toLocaleDateString()

html+=`
<tr>
<td>${date}</td>
<td>${e.category}</td>
<td>${e.amount}</td>
<td>${e.desc}</td>
<td>
<button class="edit-btn" onclick="edit(${e.id})">Ред</button>
<button class="delete-btn" onclick="del(${e.id})">Удал</button>
</td>
</tr>
`
})

historyBody.innerHTML=html
}

function renderStats(){

let total=0
let cats={}

expenses.forEach(e=>{

total+=e.amount

if(!cats[e.category]) cats[e.category]=0

cats[e.category]+=e.amount

})

document.getElementById("total").innerText=total
document.getElementById("count").innerText=expenses.length

let legendHTML=""

for(let c in cats){

legendHTML+=`
<div class="legend-item" style="background:${colors[c]}">
${c}: ${cats[c]}₽
</div>
`
}

document.getElementById("legend").innerHTML=legendHTML

let ctx=document.getElementById("chart")

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:Object.keys(cats),
datasets:[{
data:Object.values(cats),
backgroundColor:Object.keys(cats).map(c=>colors[c])
}]
},
options:{
plugins:{legend:{display:false}}
}
})
}

function renderMonths(){

let months={}

expenses.forEach(e=>{

let m=new Date(e.date).toLocaleString("ru",{month:"long",year:"numeric"})

if(!months[m]) months[m]=0

months[m]+=e.amount
})

let html=""

for(let m in months){
html+=`
<tr>
<td>${m}</td>
<td>${months[m]}</td>
</tr>
`
}

monthBody.innerHTML=html
}

function exportData(){

const data=JSON.stringify(expenses)

const blob=new Blob([data],{type:"application/json"})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="coincompass_backup.json"
a.click()
}

function importData(event){

const file=event.target.files[0]
const reader=new FileReader()

reader.onload=function(e){
localStorage.setItem("coincompass",e.target.result)
location.reload()
}

reader.readAsText(file)
}

render()

</script>

</body>
</html>
